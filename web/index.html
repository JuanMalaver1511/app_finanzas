<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />

    <!-- Descripción -->
    <meta
      name="description"
      content="Controla tus finanzas personales de forma fácil, clara y gratis."
    />

    <!-- PWA / Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Kybo" />

    <!-- Icono iOS -->
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon (para navegador) -->
    <link rel="icon" type="image/png" href="favicon.png?v=2" />

    <!-- Título -->
    <title>Kybo</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json" />
  </head>

  <body>
    <!-- PWA Install Script -->
    <script>
      let deferredPrompt = null;

      window.kyboCanInstall = false;

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredPrompt = event;
        window.kyboCanInstall = true;
      });

      window.kyboPromptInstall = async () => {
        if (!deferredPrompt) return false;

        deferredPrompt.prompt();

        const choiceResult = await deferredPrompt.userChoice;

        const accepted = choiceResult.outcome === "accepted";

        deferredPrompt = null;
        window.kyboCanInstall = false;

        return accepted;
      };
    </script>

    <!-- Flutter -->
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
