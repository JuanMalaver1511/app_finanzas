name: app_finanzas
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  cloud_functions: ^5.4.0
  image_picker: ^1.1.2

  fl_chart: ^0.66.0
  table_calendar: ^3.0.9
  emoji_picker_flutter: ^1.6.4
  file_picker: ^8.3.2

  flutter_local_notifications: ^18.0.0
  workmanager: ^0.6.0
  http: ^1.2.0
  timezone: ^0.9.4

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_oficial.png"
  web:
    generate: true
    image_path: "assets/images/logo_oficial.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/